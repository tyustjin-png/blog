baseURL: "https://jinjin123.com/"
languageCode: zh-cn
title: "金哥的思考"
theme: PaperMod
hasCJKLanguage: true

defaultContentLanguage: zh

params:
  env: production
  description: "投资 · AI · 持续行动"
  author: "金哥"
  
  # 主题设置
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowToc: true
  TocOpen: false
  
  # 首页设置
  homeInfoParams:
    Title: "金哥的思考"
    Content: >
      投资人 / 创业者 / 持续行动者
      
      
      分区间定投体系创始人 · AI工具深度玩家 · 写作爱好者
      
      
      "做在最多数量的平行宇宙中都能成功的事情。"
      
      
      [分区间定投面板](https://dashboard.jinjin123.com/)

  # 社交链接
  socialIcons:
    - name: twitter
      url: "https://x.com/"
    - name: github
      url: "https://github.com/"

  # 搜索
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

# 菜单
menu:
  main:
    - identifier: search
      name: 搜索
      url: /search/
      weight: 20
    - identifier: dashboard
      name: 定投面板
      url: /dashboard/
      weight: 22
    - identifier: investing
      name: 分区间定投
      url: /investing/
      weight: 23
    - identifier: ai-tools
      name: AI工具箱
      url: /ai-tools/
      weight: 24
    - identifier: methodology
      name: 方法论
      url: /methodology/
      weight: 25
    - identifier: about
      name: 关于
      url: /about/
      weight: 30

# 输出格式
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Markdown渲染
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
